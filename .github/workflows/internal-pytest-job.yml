name: TA for local

on:
  workflow_dispatch:

jobs:

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: "Pre-commit"
        run: echo "Fake pre-commit checks"

  tests-parallel:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test-type: [smoke, integration, e2e]

    steps:
      - name: "Run all tests"
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/${{ matrix.test-folder }}